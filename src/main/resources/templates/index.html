<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Traffic System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        form {
            margin: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

<h1>🚦 Smart Traffic System</h1>

<form action="/add" method="post">
    <input type="text" name="vehicleId" placeholder="Vehicle ID" required>
    <input type="number" name="speed" placeholder="Speed" required>
    <input type="text" name="zone" placeholder="Zone" required>
    <button type="submit">Check Violation</button>
</form>

<h2>Violations</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Vehicle</th>
        <th>Speed</th>
        <th>Zone</th>
        <th>Fine</th>
    </tr>

    <tr th:each="v : ${violations}">
        <td th:text="${v.id}"></td>
        <td th:text="${v.vehicleId}"></td>
        <td th:text="${v.speed}"></td>
        <td th:text="${v.zone}"></td>
        <td th:text="${v.fine}"></td>
    </tr>

</table>

</body>
</html>
