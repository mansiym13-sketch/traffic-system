<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Traffic System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Title -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">🚦 Smart Traffic System</h1>
        <p class="text-muted">Monitor violations and fines</p>
    </div>

    <!-- 🚀 DASHBOARD -->
    <div class="row text-center mb-4">

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h5>Total Violations</h5>
                <h3 th:text="${totalViolations}">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h5>Total Fine</h5>
                <h3>₹ <span th:text="${totalFine}">0</span></h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h5>Max Speed</h5>
                <h3 th:text="${maxSpeed}">0</h3>
            </div>
        </div>

    </div>

    <!-- Form Card -->
    <div class="card shadow p-4 mb-4">
        <h4 class="mb-3">Add Vehicle Data</h4>

        <form action="/add" method="post" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="vehicleId" class="form-control" placeholder="Vehicle ID" required>
            </div>
            <div class="col-md-4">
                <input type="number" name="speed" class="form-control" placeholder="Speed" required>
            </div>
            <div class="col-md-4">
                <input type="text" name="zone" class="form-control" placeholder="Zone" required>
            </div>

            <div class="col-12 text-center">
                <button class="btn btn-primary px-4">Check Violation</button>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div class="card shadow p-4">
        <h4 class="mb-3">Violation Records</h4>

        <table class="table table-bordered table-hover text-center">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Vehicle</th>
                <th>Speed</th>
                <th>Zone</th>
                <th>Fine</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="v : ${violations}"
                th:classappend="${v.speed > 120} ? 'table-danger' :
                                (${v.speed > 100} ? 'table-warning' : '')">

                <td th:text="${v.id}"></td>
                <td th:text="${v.vehicleId}"></td>
                <td th:text="${v.speed}"></td>
                <td th:text="${v.zone}"></td>
                <td th:text="${v.fine}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>SSS
